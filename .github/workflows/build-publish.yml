name: Build Docker images

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref, branch, or tag to build"
        required: true
        default: "main"
      image_tag:
        description: "Docker tag to publish. Defaults to ref name."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      BUILD_REF: ${{ github.event.inputs.ref || github.ref }}
      IMAGE_TAG: ${{ github.event.inputs.image_tag }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BUILD_REF }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Prepare Docker image tags
        id: docker-tags
        shell: bash
        run: |
          sanitize_tag() {
            local tag="$1"
            tag="${tag#refs/heads/}"
            tag="${tag#refs/tags/}"
            tag="$(printf '%s' "${tag}" | sed -E 's#[^A-Za-z0-9_.-]+#-#g; s#^[.-]+##; s#[.-]+$##')"
            if [[ -z "${tag}" ]]; then
              tag="build"
            fi
            printf '%.128s' "${tag}"
          }

          repo="${GITHUB_REPOSITORY,,}"
          image_tag="${IMAGE_TAG}"
          if [[ -z "${image_tag}" ]]; then
            if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
              image_tag="${BUILD_REF}"
            else
              image_tag="${GITHUB_REF_NAME}"
            fi
          fi
          image_tag="$(sanitize_tag "${image_tag}")"
          sha_tag="sha-${GITHUB_SHA::12}"
          echo "version_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          {
            echo "tags<<EOF"
            echo "ghcr.io/${repo}:${image_tag}"
            echo "ghcr.io/${repo}:${sha_tag}"
            if [[ "${GITHUB_REF_TYPE}" == "tag" || "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
              echo "ghcr.io/${repo}:latest"
            fi
            if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
              echo "${DOCKERHUB_USERNAME}/xray-checker:${image_tag}"
              echo "${DOCKERHUB_USERNAME}/xray-checker:${sha_tag}"
              if [[ "${GITHUB_REF_TYPE}" == "tag" || "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
                echo "${DOCKERHUB_USERNAME}/xray-checker:latest"
              fi
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GIT_TAG=${{ steps.docker-tags.outputs.version_tag }}
            USERNAME=${{ github.repository_owner }}
            REPOSITORY_NAME=${{ github.event.repository.name }}
          tags: ${{ steps.docker-tags.outputs.tags }}
